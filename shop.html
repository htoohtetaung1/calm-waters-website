<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calm Waters - Shop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="shop-page">
    <div class="shop-container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <h1 class="title">Shop</h1>
                <div class="coins-display">💰 <span id="coinsAmount">0</span></div>
            </div>
            <a href="game.html" class="back-btn">✕</a>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('rods')">Fishing Rods</button>
            <button class="tab-btn" onclick="switchTab('biomes')">Biomes</button>
        </div>

        <!-- Fishing Rods Section -->
        <fieldset id="rods-section" class="active">
            <legend>Fishing Rods</legend>
            <div class="items-grid">
                <div class="item-card">
                    <div class="item-icon">🪵</div>
                    <div class="item-name">Wooden Rod</div>
                    <div class="item-description">Description.</div>
                    <div class="item-footer">
                        <span class="item-price">50</span>
                        <button class="buy-btn" onclick="buyItem('wooden-rod', 50)">Buy</button>
                    </div>
                </div>

                <div class="item-card">
                    <div class="item-icon">🎍</div>
                    <div class="item-name">Bamboo Rod</div>
                    <div class="item-description">Description.</div>
                    <div class="item-footer">
                        <span class="item-price">150</span>
                        <button class="buy-btn" onclick="buyItem('bamboo-rod', 150)">Buy</button>
                    </div>
                </div>

                <div class="item-card">
                    <div class="item-icon">💎</div>
                    <div class="item-name">Carbon Rod</div>
                    <div class="item-description">Description.</div>
                    <div class="item-footer">
                        <span class="item-price">300</span>
                        <button class="buy-btn" onclick="buyItem('carbon-rod', 300)">Buy</button>
                    </div>
                </div>

                <div class="item-card">
                    <div class="item-icon">✨</div>
                    <div class="item-name">Legendary Rod</div>
                    <div class="item-description">Description.</div>
                    <div class="item-footer">
                        <span class="item-price">500</span>
                        <button class="buy-btn" onclick="buyItem('legendary-rod', 500)">Buy</button>
                    </div>
                </div>
            </div>
        </fieldset>

        <!-- Biomes Section -->
        <fieldset id="biomes-section">
            <legend>Biomes</legend>
            <div class="items-grid">
                <div class="item-card">
                    <div class="item-icon">☀️</div>
                    <div class="item-name">Beachside</div>
                    <div class="item-description">Description.</div>
                    <div class="item-footer">
                        <span class="item-price">Free</span>
                        <button class="biome-btn select-btn" onclick="selectBiome('sunny-lake', this)" data-biome="sunny-lake">Select</button>
                    </div>
                </div>

                <div class="item-card">
                    <div class="item-icon">🚤</div>
                    <div class="item-name">Mountain Lake</div>
                    <div class="item-description">Description.</div>
                    <div class="item-footer">
                        <span class="item-price">200</span>
                        <button class="biome-btn" onclick="buyBiome('ocean', 200, this)" data-biome="ocean">Buy</button>
                    </div>
                </div>

                <div class="item-card">
                    <div class="item-icon">🐻‍❄️</div>
                    <div class="item-name">Arctic</div>
                    <div class="item-description">Description.</div>
                    <div class="item-footer">
                        <span class="item-price">250</span>
                        <button class="biome-btn" onclick="buyBiome('mountain-stream', 250, this)" data-biome="mountain-stream">Buy</button>
                    </div>
                </div>

                <div class="item-card">
                    <div class="item-icon">🌊</div>
                    <div class="item-name">Deep Ocean</div>
                    <div class="item-description">Description.</div>
                    <div class="item-footer">
                        <span class="item-price">300</span>
                        <button class="biome-btn" onclick="buyBiome('forest-pond', 300, this)" data-biome="forest-pond">Buy</button>
                    </div>
                </div>

            </div>
        </fieldset>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
