<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calm Waters - Stats</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="stats-page">
    <div class="stats-container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <h1 class="title">Stats</h1>
            </div>
            <a href="game.html" class="back-btn">✕</a>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <!-- Total Time Played -->
            <div class="stat-card">
                <div class="stat-icon">⏱️</div>
                <div class="stat-label">Total Time Played</div>
                <div class="stat-value time" id="timePlayed">0h 0m</div>
            </div>

            <!-- Total Fish Caught -->
            <div class="stat-card">
                <div class="stat-icon">🐟</div>
                <div class="stat-label">Total Fish Caught</div>
                <div class="stat-value fish" id="fishCaught">0</div>
            </div>

            <!-- Total Gold Gained -->
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-label">Total Gold Gained</div>
                <div class="stat-value gold" id="goldGained">0</div>
            </div>

            <!-- Total Gold Spent -->
            <div class="stat-card">
                <div class="stat-icon">💸</div>
                <div class="stat-label">Total Gold Spent</div>
                <div class="stat-value spent" id="goldSpent">0</div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
